name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Validate JSON files
        shell: bash
        run: |
          python scripts/sync_packaged_assets.py --check
          python -m json.tool plugins/context-pack/.codex-plugin/plugin.json >/dev/null
          python -m json.tool .context-pack/manifest.json >/dev/null
          python -m json.tool .agents/plugins/marketplace.json >/dev/null
          python -m json.tool package.json >/dev/null

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate packaged CLI
        run: |
          python -m pip install build twine
          python -m pip install -e .
          context-pack --help
          python -m context_pack --help
          node bin/context-pack.js --help
          python -m build
          python -m twine check dist/*
          python -c "import pathlib, subprocess, sys; wheels = list(pathlib.Path('dist').glob('*.whl')); assert len(wheels) == 1, wheels; subprocess.run([sys.executable, '-m', 'pip', 'install', '--force-reinstall', str(wheels[0])], check=True)"
          context-pack --version
          npm pack --dry-run
          python scripts/validate_packaged_cli.py
          python -c "import json, pathlib, subprocess, tempfile; root = pathlib.Path(tempfile.mkdtemp()); target = root / 'plugins' / 'context-pack'; marketplace = root / '.agents' / 'plugins' / 'marketplace.json'; subprocess.run(['context-pack', 'install-codex', '--target', str(target), '--marketplace', str(marketplace), '--quiet'], check=True); assert (target / '.codex-plugin' / 'plugin.json').exists(); assert (target / 'skills' / 'context-pack' / 'SKILL.md').exists(); data = json.loads(marketplace.read_text(encoding='utf-8')); assert data['plugins'][0]['name'] == 'context-pack'"
          context-pack status --quiet
          python -c "import subprocess, sys; status = lambda: subprocess.check_output(['git', 'status', '--porcelain=v1', '-uall'], text=True); before = status(); subprocess.run(['context-pack', 'checkpoint', '--pack', '--quiet'], check=True); after = status(); sys.stdout.write('Before checkpoint:\n' + (before or '<clean>\n') + 'After checkpoint:\n' + (after or '<clean>\n')) if after != before else None; sys.exit(1 if after != before else 0)"
