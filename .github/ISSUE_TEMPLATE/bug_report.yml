name: Bug report
description: Report a problem with Context Pack.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands or repo state that reproduces the problem.
      placeholder: |
        context-pack setup
        context-pack start --changed
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include relevant output from `context-pack doctor` if available.
